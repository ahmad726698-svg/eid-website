<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌙 Eid-ul-Fitr Mubarak | Ahmad Raza</title>
<style>
  body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #2c5364);
    color: gold;
    text-align: center;
  }
  h1 {
    font-size: 60px;
    margin-top: 150px;
    text-shadow: 2px 2px 10px black;
  }
  h2 {
    font-size: 40px;
  }
  .moon { font-size: 80px; animation: float 3s infinite; }
  @keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-20px);}
    100% {transform: translateY(0);}
  }
  audio { display:none; } /* hidden music */
</style>
</head>
<body>
  <div class="moon">🌙</div>
  <h1>Eid-ul-Fitr Mubarak</h1>
  <h2>From Ahmad Raza</h2>

  <!-- Auto-play music -->
  <audio autoplay loop>
    <source src="eid-music.mp3" type="audio/mpeg">
  </audio>

  <!-- Optional YouTube video -->
  <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1&loop=1&playlist=VIDEO_ID" 
  title="Eid Video" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</body>
</html>
